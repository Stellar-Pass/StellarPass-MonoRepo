<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B3FE4"/>
      <stop offset="100%" stop-color="#14B6E7"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0D4FF"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- Four-pointed star -->
  <path d="
    M 128 36
    L 148 104
    L 216 84
    L 164 128
    L 216 172
    L 148 152
    L 128 220
    L 108 152
    L 40 172
    L 92 128
    L 40 84
    L 108 104
    Z
  " fill="url(#star)" opacity="0.95"/>

  <!-- Inner circle -->
  <circle cx="128" cy="128" r="20" fill="url(#bg)" opacity="0.6"/>
</svg>
